<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Week 2 API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 { color: #fff; }
        .endpoint {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            font-family: monospace;
        }
        .method {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: 10px;
        }
        .get { background: #4CAF50; }
        .post { background: #2196F3; }
        code {
            background: rgba(0,0,0,0.3);
            padding: 2px 5px;
            border-radius: 3px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #45a049;
        }
        pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 My Week 2 API!</h1>
        <p>Welcome to my Express.js API assignment</p>
        
        <h2>📡 Available Endpoints:</h2>
        
        <div class="endpoint">
            <span class="method get">GET</span>
            <code>/api</code> - Returns "My Week 2 API!"
        </div>
        
        <div class="endpoint">
            <span class="method post">POST</span>
            <code>/user</code> - Accepts {name, email} and responds "Hello, [name]!"
        </div>
        
        <div class="endpoint">
            <span class="method get">GET</span>
            <code>/user/:id</code> - Returns "User [id] profile"
        </div>
        
        <h2>🧪 Test the API:</h2>
        <button onclick="testAPI()">Test GET /api</button>
        <button onclick="testUser()">Test POST /user</button>
        <pre id="output">Click a button to test the API...</pre>
    </div>

    <script>
        async function testAPI() {
            try {
                const response = await fetch('/api');
                const data = await response.json();
                document.getElementById('output').innerHTML = 
                    `✅ GET /api Response:\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('output').innerHTML = `❌ Error: ${error.message}`;
            }
        }
        
        async function testUser() {
            try {
                const response = await fetch('/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name: "John Doe", 
                        email: "john@example.com" 
                    })
                });
                const data = await response.json();
                document.getElementById('output').innerHTML = 
                    `✅ POST /user Response:\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('output').innerHTML = `❌ Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
